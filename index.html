<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍🍳</text></svg>"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f3fcf1" />
    <meta
      name="description"
      content="냉장고 속 식재료를 AI가 인식해, 지금 만들 수 있는 요리를 찾아드립니다. 비건 모드도 지원합니다."
    />

    <!-- 새로고침 시 테마 깜빡임 방지: 렌더 전에 저장된 모드로 data-theme 적용 -->
    <script>
      try {
        if (localStorage.getItem("vegan-chef:mode") === "vegan")
          document.documentElement.setAttribute("data-theme", "vegan");
      } catch (e) {}
    </script>

    <!-- 폰트 — Inter(일반) · Plus Jakarta Sans + Be Vietnam Pro(비건) · Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@400;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />

    <title>Fridge Chef — 냉장고로 만드는 요리</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
